services:
  # Backend API
  - type: web
    name: araras-negras-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: DB_HOST
        fromDatabase:
          name: araras-negras-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: araras-negras-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: araras-negras-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: araras-negras-db
          property: database
      - key: JWT_SECRET
        generateValue: true

  # Frontend (site público)
  - type: static
    name: araras-negras-site
    runtime: static
    buildCommand: echo "Static site - no build needed"
    publishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Frontend Admin
  - type: static
    name: araras-negras-admin
    runtime: static
    buildCommand: echo "Static site - no build needed"
    publishPath: ./admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: araras-negras-db
    databaseName: araras_negras
    user: araras_user
    plan: free